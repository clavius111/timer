<!DOCTYPE html>
<html>
<head>
    <title>런사 전용 서버 상황실</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        /* 디자인은 첫 버전의 깔끔한 세로형으로 유지했습니다 */
        body { background: #1a1a1a; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .timer-card { background: #2d2d2d; border-radius: 10px; padding: 15px; margin-bottom: 15px; width: 320px; border: 1px solid #444; }
        input { background: #111; color: #00ff00; border: 1px solid #555; font-size: 24px; width: 90%; text-align: center; padding: 8px; border-radius: 5px; margin: 10px 0; }
        button { padding: 10px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; width: 48%; }
        .start { background: #2e7d32; color: white; }
        .reset { background: #c62828; color: white; }
    </style>
</head>
<body>

    <div id="app"></div>

    <script>
        // 2. 런사님 전용 서버 주소 (어제 쓰던 주소로 꼭 바꾸세요!)
        const firebaseConfig = { databaseURL: "https://your-project-id.firebaseio.com" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 타이머 카드 3개 만들기
        for (let i = 1; i <= 3; i++) {
            const card = document.createElement('div');
            card.className = 'timer-card';
            card.innerHTML = `
                <input type="text" id="m${i}" placeholder="메모 (예: S21 매크로)" style="font-size: 14px; color: #888; border:none; border-bottom:1px solid #444;">
                <input type="text" id="t${i}" placeholder="1시간 30분 / 10">
                <div style="display:flex; gap:10px; justify-content:center;">
                    <button class="start" onclick="saveToTicker(${i})">START</button>
                    <button class="reset" onclick="deleteFromTicker(${i})">RESET</button>
                </div>
            `;
            document.getElementById('app').appendChild(card);

            // [핵심] 서버 감시: 새로고침해도 여기서 데이터를 다시 가져옵니다!
            db.ref('timers/' + i).on('value', (snapshot) => {
                const data = snapshot.val();
                if (data && data.endTime) {
                    document.getElementById('m${i}').value = data.memo || "";
                    startCountdown(i, data.endTime); // 서버 데이터로 숫자 세기 시작!
                } else {
                    document.getElementById('t${i}').value = "";
                }
            });
        }

        // 서버에 저장하는 함수
        function saveToTicker(id) {
            const inputVal = document.getElementById('t' + id).value;
            // (여기에 시간 계산 로직이 들어갑니다...)
            const endTime = Date.now() + 600000; // 예시: 일단 10분으로 저장
            db.ref('timers/' + id).set({
                endTime: endTime,
                memo: document.getElementById('m' + id).value
            });
        }

        // 서버에서 삭제하는 함수
        function deleteFromTicker(id) {
            if(confirm("리셋할까요?")) db.ref('timers/' + id).remove();
        }

        // 화면에 숫자 굴리는 함수
        function startCountdown(id, endTime) {
            setInterval(() => {
                const now = Date.now();
                const diff = Math.round((endTime - now) / 1000);
                if (diff <= 0) {
                    document.getElementById('t' + id).value = "FINISH!";
                } else {
                    const m = Math.floor(diff / 60);
                    const s = diff % 60;
                    document.getElementById('t' + id).value = m + ":" + s;
                }
            }, 1000);
        }
    </script>
</body>
</html>
