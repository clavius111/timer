<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>런사 서버 상황실 (메모 고정형)</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { background: #1a1a1a; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .timer-container { display: flex; flex-direction: column; gap: 15px; width: 340px; }
        .timer-card { background: #2d2d2d; border-radius: 12px; padding: 18px; border: 1px solid #444; }
        .memo-input { background: transparent; color: #00ff00; border: none; border-bottom: 1px solid #444; width: 100%; font-size: 14px; margin-bottom: 12px; padding: 5px; outline: none; font-weight: bold; }
        .time-input { background: #111; color: #eee; border: 1px solid #555; font-size: 26px; width: 100%; text-align: center; padding: 10px 0; border-radius: 6px; margin-bottom: 15px; outline: none; font-family: monospace; }
        .btn-group { display: flex; gap: 10px; }
        button { padding: 10px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; flex: 1; }
        .start { background: #2e7d32; color: white; }
        .reset { background: #c62828; color: white; }
    </style>
</head>
<body>

    <div class="timer-container" id="app"></div>

    <script>
        const firebaseConfig = { databaseURL: "https://timer-5027d-default-rtdb.asia-southeast1.firebasedatabase.app" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let activeIntervals = {};

        function parseToSeconds(str) {
            let total = 0;
            const h = str.match(/(\d+)\s*(h|시간)/);
            const m = str.match(/(\d+)\s*(m|분)/);
            const s = str.match(/(\d+)\s*(s|초)/);
            if (h) total += parseInt(h[1]) * 3600;
            if (m) total += parseInt(m[1]) * 60;
            if (s) total += parseInt(s[1]);
            if (!h && !m && !s && !isNaN(str) && str !== "") total = parseInt(str) * 60;
            return total;
        }

        for (let i = 1; i <= 3; i++) {
            const card = document.createElement('div');
            card.className = 'timer-card';
            card.innerHTML = `
                <input type="text" id="m${i}" class="memo-input" placeholder="메모 입력" onchange="updateMemo(${i})">
                <input type="text" id="t${i}" class="time-input" placeholder="시간 입력">
                <div class="btn-group">
                    <button class="start" onclick="saveToCloud(${i})">START</button>
                    <button class="reset" onclick="resetTimeOnly(${i})">RESET</button>
                </div>
            `;
            document.getElementById('app').appendChild(card);

            db.ref('timers/' + i).on('value', (snapshot) => {
                const data = snapshot.val();
                const tInput = document.getElementById('t' + i);
                const mInput = document.getElementById('m' + i);
                
                if (activeIntervals[i]) clearInterval(activeIntervals[i]);

                if (data) {
                    mInput.value = data.memo || ""; // 메모가 있으면 무조건 표시
                    if (data.endTime && data.endTime > Date.now()) {
                        startTicker(i, data.endTime);
                    } else if (data.endTime) {
                        tInput.value = "FINISH!";
                        tInput.style.color = "#ff4444";
                    } else {
                        tInput.value = "";
                        tInput.style.color = "#eee";
                    }
                }
            });
        }

        // 메모만 따로 서버에 저장하는 함수 (입력 후 엔터/클릭 시 작동)
        function updateMemo(id) {
            const memoText = document.getElementById('m' + id).value;
            db.ref('timers/' + id).update({ memo: memoText });
        }

        function saveToCloud(id) {
            const val = document.getElementById('t' + id).value;
            const duration = parseToSeconds(val);
            if (duration <= 0) return alert("시간을 입력해주세요!");

            const endTime = Date.now() + duration * 1000;
            db.ref('timers/' + id).update({
                endTime: endTime,
                memo: document.getElementById('m' + id).value
            });
        }

        // 🚨 리셋 시 메모는 두고 시간(endTime)만 삭제!
        function resetTimeOnly(id) {
            if (confirm("시간을 초기화하시겠습니까? (메모는 유지됩니다)")) {
                db.ref('timers/' + id).update({ endTime: null });
            }
        }

        function startTicker(id, endTime) {
            const el = document.getElementById('t' + id);
            activeIntervals[id] = setInterval(() => {
                const remaining = Math.round((endTime - Date.now()) / 1000);
                if (remaining <= 0) {
                    clearInterval(activeIntervals[id]);
                    el.value = "FINISH!";
                    el.style.color = "#ff4444";
                } else {
                    const h = Math.floor(remaining / 3600).toString().padStart(2, '0');
                    const m = Math.floor((remaining % 3600) / 60).toString().padStart(2, '0');
                    const s = (remaining % 60).toString().padStart(2, '0');
                    el.value = `${h}:${m}:${s}`;
                    el.style.color = "#00ff00";
                }
            }, 1000);
        }
    </script>
</body>
</html>
