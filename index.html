<!DOCTYPE html>
<html>
<head>
    <style>
        body { background: #1a1a1a; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 10px; }
        .timer-card { background: #333; border-radius: 12px; padding: 15px; margin-bottom: 10px; width: 90%; text-align: center; border: 2px solid #444; }
        .title { font-size: 14px; color: #aaa; margin-bottom: 8px; font-weight: bold; }
        /* 입력창을 큼직하게 수정 */
        input { background: #222; color: #00ff00; border: 1px solid #555; font-size: 24px; width: 80%; text-align: center; padding: 10px; border-radius: 8px; margin-bottom: 10px; }
        .btn-group { display: flex; gap: 8px; justify-content: center; }
        button { padding: 12px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 14px; }
        .start { background: #28a745; color: white; flex: 2; }
        .reset { background: #dc3545; color: white; flex: 1; }
    </style>
</head>
<body>

    <div class="timer-card">
        <div class="title">📱 PHONE MACRO (20 ROUNDS)</div>
        <input type="text" id="t1" value="00:15:00" placeholder="HH:MM:SS">
        <div class="btn-group">
            <button class="start" onclick="start(1)">START</button>
            <button class="reset" onclick="reset(1)">RESET</button>
        </div>
    </div>

    <div class="timer-card">
        <div class="title">💻 PC BING (32 ROUNDS)</div>
        <input type="text" id="t2" value="00:25:00" placeholder="HH:MM:SS">
        <div class="btn-group">
            <button class="start" onclick="start(2)">START</button>
            <button class="reset" onclick="reset(2)">RESET</button>
        </div>
    </div>

    <div class="timer-card">
        <div class="title">🎮 GAME / CUSTOM</div>
        <input type="text" id="t3" value="01:00:00" placeholder="HH:MM:SS">
        <div class="btn-group">
            <button class="start" onclick="start(3)">START</button>
            <button class="reset" onclick="reset(3)">RESET</button>
        </div>
    </div>

    <script>
        let intervals = {};
        function start(id) {
            if (intervals[id]) return;
            let el = document.getElementById('t' + id);
            let parts = el.value.split(':');
            let sec = (+parts[0]) * 3600 + (+parts[1]) * 60 + (+parts[2]);
            
            intervals[id] = setInterval(() => {
                if (sec <= 0) {
                    clearInterval(intervals[id]);
                    intervals[id] = null;
                    el.style.color = "red";
                    alert(id + "번 작업 완료!");
                    return;
                }
                sec--;
                let h = Math.floor(sec / 3600).toString().padStart(2, '0');
                let m = Math.floor((sec % 3600) / 60).toString().padStart(2, '0');
                let s = (sec % 60).toString().padStart(2, '0');
                el.value = h + ":" + m + ":" + s;
                el.style.color = "#00ff00";
            }, 1000);
        }
        function reset(id) {
            clearInterval(intervals[id]);
            intervals[id] = null;
            document.getElementById('t' + id).value = "00:00:00";
            document.getElementById('t' + id).style.color = "#00ff00";
        }
    </script>
</body>
</html>
