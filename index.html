<!DOCTYPE html>
<html>
<head>
    <style>
        body { background: #1a1a1a; color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .timer-container { display: flex; flex-direction: column; gap: 15px; width: 320px; } /* 세로 배치 및 너비 고정 */
        .timer-card { background: #2d2d2d; border-radius: 8px; padding: 12px; border: 1px solid #444; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        
        /* 한 줄 메모장 스타일 */
        .memo-input { 
            background: transparent; color: #888; border: none; border-bottom: 1px solid #444;
            width: 95%; font-size: 11px; margin-bottom: 8px; padding: 2px 5px; outline: none;
        }
        .memo-input:focus { border-bottom: 1px solid #00ff00; color: #eee; }

        /* 시간 입력창: 24시간도 넉넉하게 */
        .time-display { 
            background: #111; color: #00ff00; border: 1px solid #555; 
            font-size: 32px; width: 95%; text-align: center; 
            padding: 5px 0; border-radius: 4px; margin-bottom: 10px;
            font-family: 'Courier New', monospace;
        }

        /* 버튼 그룹: 슬림하고 깔끔하게 */
        .btn-group { display: flex; gap: 5px; justify-content: flex-end; }
        button { 
            padding: 4px 10px; border: none; border-radius: 3px; 
            cursor: pointer; font-weight: bold; font-size: 11px; 
        }
        .start { background: #2e7d32; color: white; }
        .reset { background: #c62828; color: white; }
        button:hover { opacity: 0.8; }
    </style>
</head>
<body>

    <div class="timer-container">
        <div class="timer-card">
            <input type="text" class="memo-input" placeholder="여기에 메모 입력 (예: S21 미국주식)">
            <input type="text" id="t1" class="time-display" value="00:15:00">
            <div class="btn-group">
                <button class="start" onclick="start(1)">START</button>
                <button class="reset" onclick="reset(1)">RESET</button>
            </div>
        </div>

        <div class="timer-card">
            <input type="text" class="memo-input" placeholder="여기에 메모 입력 (예: PC 블루스택)">
            <input type="text" id="t2" class="time-display" value="00:25:00">
            <div class="btn-group">
                <button class="start" onclick="start(2)">START</button>
                <button class="reset" onclick="reset(2)">RESET</button>
            </div>
        </div>

        <div class="timer-card">
            <input type="text" class="memo-input" placeholder="여기에 메모 입력 (예: 기타 작업)">
            <input type="text" id="t3" class="time-display" value="24:00:00">
            <div class="btn-group">
                <button class="start" onclick="start(3)">START</button>
                <button class="reset" onclick="reset(3)">RESET</button>
            </div>
        </div>
    </div>

    <script>
        let intervals = {};
        function start(id) {
            if (intervals[id]) return;
            let el = document.getElementById('t' + id);
            let parts = el.value.split(':');
            let sec = (+parts[0]) * 3600 + (+parts[1]) * 60 + (+parts[2]);
            
            intervals[id] = setInterval(() => {
                if (sec <= 0) {
                    clearInterval(intervals[id]);
                    intervals[id] = null;
                    el.style.color = "#ff4444";
                    alert(id + "번 작업이 종료되었습니다!");
                    return;
                }
                sec--;
                let h = Math.floor(sec / 3600).toString().padStart(2, '0');
                let m = Math.floor((sec % 3600) / 60).toString().padStart(2, '0');
                let s = (sec % 60).toString().padStart(2, '0');
                el.value = h + ":" + m + ":" + s;
                el.style.color = "#00ff00";
            }, 1000);
        }

        function reset(id) {
            // 리셋 시 경고창 추가
            if (confirm(id + "번 타이머를 초기화하시겠습니까?")) {
                clearInterval(intervals[id]);
                intervals[id] = null;
                document.getElementById('t' + id).value = "00:00:00";
                document.getElementById('t' + id).style.color = "#00ff00";
            }
        }
    </script>
</body>
</html>
