<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title> 서버 상황실</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { background: #1a1a1a; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .timer-container { display: flex; flex-direction: column; gap: 15px; width: 340px; }
        .timer-card { background: #2d2d2d; border-radius: 10px; padding: 18px; border: 1px solid #444; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .memo-input { background: transparent; color: #00ff00; border: none; border-bottom: 1px solid #444; width: 100%; font-size: 14px; margin-bottom: 10px; padding: 5px; outline: none; font-weight: bold; }
        .time-input { background: #111; color: #eee; border: 1px solid #555; font-size: 24px; width: 100%; text-align: center; padding: 10px 0; border-radius: 6px; margin-bottom: 10px; outline: none; }
        .btn-group { display: flex; gap: 10px; }
        button { padding: 10px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 13px; flex: 1; transition: 0.2s; }
        .start { background: #2e7d32; color: white; }
        .reset { background: #c62828; color: white; }
        button:hover { opacity: 0.8; }
    </style>
</head>
<body>

    <div class="timer-container" id="app"></div>

    <script>
        // 🔥 런사님의 실제 파이어베이스 주소 적용 완료!
        const firebaseConfig = {
            databaseURL: "https://timer-5027d-default-rtdb.asia-southeast1.firebasedatabase.app"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 🧠 시간 파싱 엔진 (1시간 30분, 90m 등 지원)
        function parseToSeconds(str) {
            let total = 0;
            const h = str.match(/(\d+)\s*(h|hour|시간)/);
            const m = str.match(/(\d+)\s*(m|min|분)/);
            const s = str.match(/(\d+)\s*(s|sec|초)/);
            if (h) total += parseInt(h[1]) * 3600;
            if (m) total += parseInt(m[1]) * 60;
            if (s) total += parseInt(s[1]);
            if (!h && !m && !s && !isNaN(str)) total = parseInt(str) * 60;
            return total;
        }

        // 1~3번 타이머 생성 및 서버 연동
        for (let i = 1; i <= 3; i++) {
            const card = document.createElement('div');
            card.className = 'timer-card';
            card.innerHTML = `
                <input type="text" id="m${i}" class="memo-input" placeholder="메모 (예: S21 매크로)">
                <input type="text" id="t${i}" class="time-input" placeholder="예: 1시간 30분">
                <div class="btn-group">
                    <button class="start" onclick="saveTimer(${i})">START</button>
                    <button class="reset" onclick="resetTimer(${i})">RESET</button>
                </div>
            `;
            document.getElementById('app').appendChild(card);

            // 📡 서버 실시간 감시 (새로고침해도 여기서 불러옴)
            db.ref('timers/' + i).on('value', (snapshot) => {
                const data = snapshot.val();
                const tInput = document.getElementById('t' + i);
                const mInput = document.getElementById('m' + i);
                
                if (data && data.endTime) {
                    mInput.value = data.memo || "";
                    runDisplay(i, data.endTime); // 서버 데이터로 숫자 세기 시작
                } else {
                    tInput.value = "";
                    tInput.style.color = "#eee";
                }
            });
        }

        // 서버에 저장 (Start 버튼)
        function saveTimer(id) {
            const val = document.getElementById('t' + id).value;
            const duration = parseToSeconds(val);
            if (duration <= 0) return alert("시간을 입력해주세요!");

            const endTime = Date.now() + duration * 1000;
            db.ref('timers/' + id).set({
                endTime: endTime,
                memo: document.getElementById('m' + id).value
            });
        }

        // 서버에서 삭제 (Reset 버튼)
        function resetTimer(id) {
            if (confirm("초기화하시겠습니까?")) {
                db.ref('timers/' + id).remove();
            }
        }

        // 화면 숫자 업데이트 로직
        let intervals = {};
        function runDisplay(id, endTime) {
            if (intervals[id]) clearInterval(intervals[id]);
            
            intervals[id] = setInterval(() => {
                const remaining = Math.round((endTime - Date.now()) / 1000);
                const el = document.getElementById('t' + id);
                
                if (remaining <= 0) {
                    clearInterval(intervals[id]);
                    el.value = "FINISH!";
                    el.style.color = "#ff4444";
                } else {
                    const h = Math.floor(remaining / 3600).toString().padStart(2, '0');
                    const m = Math.floor((remaining % 3600) / 60).toString().padStart(2, '0');
                    const s = (remaining % 60).toString().padStart(2, '0');
                    el.value = `${h}:${m}:${s}`;
                    el.style.color = "#00ff00";
                }
            }, 1000);
        }
    </script>
</body>
</html>
