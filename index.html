<!DOCTYPE html>
<html>
<head>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { background: #1a1a1a; color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .timer-container { display: flex; flex-direction: column; gap: 15px; width: 340px; }
        .timer-card { background: #2d2d2d; border-radius: 10px; padding: 18px; border: 1px solid #444; box-shadow: 0 4px 20px rgba(0,0,0,0.6); }
        .memo-input { background: transparent; color: #00ff00; border: none; border-bottom: 1px solid #444; width: 100%; font-size: 14px; margin-bottom: 12px; padding: 5px; outline: none; font-weight: bold; }
        .time-input { background: #111; color: #eee; border: 1px solid #555; font-size: 24px; width: 100%; text-align: center; padding: 10px 0; border-radius: 6px; margin-bottom: 12px; outline: none; }
        .btn-group { display: flex; gap: 10px; }
        button { padding: 10px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 13px; flex: 1; }
        .start { background: #2e7d32; color: white; }
        .reset { background: #c62828; color: white; }
    </style>
</head>
<body>

    <div class="timer-container" id="app">
        </div>

    <script>
        // 🔥 런사님의 파이어베이스 설정 (어제 넣었던 그거!)
        const firebaseConfig = {
            databaseURL: "https://your-project-id.firebaseio.com" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 지능형 시간 파싱 (1시간 30분 등)
        function parseToSeconds(str) {
            let total = 0;
            const h = str.match(/(\d+)\s*(h|hour|시간)/);
            const m = str.match(/(\d+)\s*(m|min|분)/);
            const s = str.match(/(\d+)\s*(s|sec|초)/);
            if (h) total += parseInt(h[1]) * 3600;
            if (m) total += parseInt(m[1]) * 60;
            if (s) total += parseInt(s[1]);
            if (!h && !m && !s && !isNaN(str)) total = parseInt(str) * 60;
            return total;
        }

        // 서버에 타이머 데이터 저장 (Start 버튼)
        function startTimer(id) {
            const input = document.getElementById('t' + id).value;
            const duration = parseToSeconds(input);
            if (duration <= 0) return alert("시간을 입력하세요!");

            const endTime = Date.now() + duration * 1000;
            db.ref('timers/' + id).set({
                endTime: endTime,
                memo: document.getElementById('m' + id).value,
                active: true
            });
        }

        // 리셋 버튼 (서버 데이터 삭제)
        function resetTimer(id) {
            if (confirm("초기화할까요?")) {
                db.ref('timers/' + id).remove();
            }
        }

        // 실시간 동기화 및 화면 업데이트
        for (let i = 1; i <= 3; i++) {
            const card = document.createElement('div');
            card.className = 'timer-card';
            card.innerHTML = `
                <input type="text" id="m${i}" class="memo-input" placeholder="메모 입력" onchange="db.ref('timers/${i}/memo').set(this.value)">
                <input type="text" id="t${i}" class="time-input" placeholder="1시간 30분">
                <div class="btn-group">
                    <button class="start" onclick="startTimer(${i})">START</button>
                    <button class="reset" onclick="resetTimer(${i})">RESET</button>
                </div>
            `;
            document.getElementById('app').appendChild(card);

            // 서버 데이터 감시 (PC/폰 실시간 동기화)
            db.ref('timers/' + i).on('value', (snapshot) => {
                const data = snapshot.val();
                const inputEl = document.getElementById('t' + i);
                const memoEl = document.getElementById('m' + i);
                
                if (data && data.active) {
                    memoEl.value = data.memo || "";
                    updateDisplay(i, data.endTime);
                } else {
                    inputEl.value = "";
                    inputEl.style.color = "#eee";
                }
            });
        }

        function updateDisplay(id, endTime) {
            const timerInterval = setInterval(() => {
                const remaining = Math.round((endTime - Date.now()) / 1000);
                const el = document.getElementById('t' + id);
                if (!el) return clearInterval(timerInterval);

                if (remaining <= 0) {
                    clearInterval(timerInterval);
                    el.value = "FINISH!";
                    el.style.color = "#ff4444";
                } else {
                    const h = Math.floor(remaining / 3600).toString().padStart(2, '0');
                    const m = Math.floor((remaining % 3600) / 60).toString().padStart(2, '0');
                    const s = (remaining % 60).toString().padStart(2, '0');
                    el.value = `${h}:${m}:${s}`;
                    el.style.color = "#00ff00";
                }
            }, 1000);
        }
    </script>
</body>
</html>
