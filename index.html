<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>서버 동기화 정밀 타이머</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        :root { --bg: #f4f4f9; --card: #ffffff; --primary: #4a90e2; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; }
        h1 { margin-top: 20px; color: #333; }
        .container { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; padding: 20px; width: 100%; max-width: 1000px; }
        .card { background: var(--card); border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); padding: 20px; width: 280px; text-align: center; transition: transform 0.2s; }
        .card:hover { transform: translateY(-5px); }
        .memo-input { width: 90%; border: none; border-bottom: 2px solid #ddd; margin-bottom: 15px; padding: 5px; font-size: 1rem; text-align: center; outline: none; }
        .memo-input:focus { border-bottom-color: var(--primary); }
        .time-display { font-size: 2.5rem; font-weight: bold; margin: 20px 0; color: #222; font-variant-numeric: tabular-nums; }
        .input-group { margin-bottom: 15px; }
        input[type="text"].time-input { width: 80%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem; }
        .btn-group { display: flex; gap: 10px; justify-content: center; }
        button { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .start-btn { background: var(--primary); color: white; }
        .reset-btn { background: #e74c3c; color: white; }
        button:active { opacity: 0.8; }
        .status { font-size: 0.8rem; color: #888; margin-top: 10px; }
    </style>
</head>
<body>

<h1>🌐 실시간 클라우드 타이머</h1>
<div class="container">
    <div class="card" id="card-0">
        <input type="text" class="memo-input" id="memo-0" placeholder="메모 (예: 라면)" onchange="updateMemo(0)">
        <div class="time-display" id="display-0">00:00:00</div>
        <div class="input-group">
            <input type="text" class="time-input" id="input-0" placeholder="1시간 20분 / 30분 / 10">
        </div>
        <div class="btn-group">
            <button class="start-btn" onclick="startTimer(0)">시작</button>
            <button class="reset-btn" onclick="resetTimer(0)">초기화</button>
        </div>
        <div class="status" id="status-0">서버 연결 대기중...</div>
    </div>

    <div class="card" id="card-1">
        <input type="text" class="memo-input" id="memo-1" placeholder="메모" onchange="updateMemo(1)">
        <div class="time-display" id="display-1">00:00:00</div>
        <div class="input-group">
            <input type="text" class="time-input" id="input-1" placeholder="시간 입력">
        </div>
        <div class="btn-group">
            <button class="start-btn" onclick="startTimer(1)">시작</button>
            <button class="reset-btn" onclick="resetTimer(1)">초기화</button>
        </div>
        <div class="status" id="status-1">서버 연결 대기중...</div>
    </div>

    <div class="card" id="card-2">
        <input type="text" class="memo-input" id="memo-2" placeholder="메모" onchange="updateMemo(2)">
        <div class="time-display" id="display-2">00:00:00</div>
        <div class="input-group">
            <input type="text" class="time-input" id="input-2" placeholder="시간 입력">
        </div>
        <div class="btn-group">
            <button class="start-btn" onclick="startTimer(2)">시작</button>
            <button class="reset-btn" onclick="resetTimer(2)">초기화</button>
        </div>
        <div class="status" id="status-2">서버 연결 대기중...</div>
    </div>
</div>

<script>
    // 1. Firebase 설정
    const firebaseConfig = {
        apiKey: "AIzaSyAfATrzD7Nzgq8G7ofgcf3rPpkobjWRfUA",
        authDomain: "timer-5027d.firebaseapp.com",
        projectId: "timer-5027d",
        storageBucket: "timer-5027d.firebasestorage.app",
        messagingSenderId: "948471702584",
        appId: "1:948471702584:web:26af3ca742a0384d8032cd",
        measurementId: "G-73YC6D58YT",
        databaseURL: "https://timer-5027d-default-rtdb.asia-southeast1.firebasedatabase.app/"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let localTimers = [null, null, null];

    // 2. 서버 데이터 실시간 감시
    db.ref('timers').on('value', (snapshot) => {
        const data = snapshot.val();
        if (data) {
            localTimers = data;
            data.forEach((timer, i) => {
                if (timer) {
                    document.getElementById(`memo-${i}`).value = timer.memo || "";
                    document.getElementById(`status-${i}`).innerText = "서버 동기화됨";
                }
            });
        }
    });

    // 3. 타이머 시작 (서버에 전송)
    function startTimer(id) {
        const inputStr = document.getElementById(`input-${id}`).value;
        const memo = document.getElementById(`memo-${id}`).value;
        const durationMs = parseTime(inputStr);

        if (durationMs <= 0) return alert("시간을 입력해주세요!");

        const targetTime = Date.now() + durationMs;
        db.ref(`timers/${id}`).set({
            targetTime: targetTime,
            memo: memo,
            isActive: true
        });
    }

    // 4. 초기화 (서버 데이터 삭제)
    function resetTimer(id) {
        db.ref(`timers/${id}`).remove();
        document.getElementById(`display-${id}`).innerText = "00:00:00";
        document.getElementById(`status-${id}`).innerText = "초기화됨";
    }

    // 5. 메모만 수정할 때
    function updateMemo(id) {
        const memo = document.getElementById(`memo-${id}`).value;
        db.ref(`timers/${id}/memo`).set(memo);
    }

    // 6. 자연어 처리 (시간 파싱)
    function parseTime(str) {
        let totalMs = 0;
        const h = str.match(/(\d+)\s*시간/);
        const m = str.match(/(\d+)\s*분/);
        const s = str.match(/(\d+)\s*초/);
        const onlyNum = str.match(/^\d+$/);

        if (h) totalMs += parseInt(h[1]) * 3600000;
        if (m) totalMs += parseInt(m[1]) * 60000;
        if (s) totalMs += parseInt(s[1]) * 1000;
        if (onlyNum) totalMs += parseInt(onlyNum[0]) * 60000; // 숫자만 쓰면 분 단위

        return totalMs;
    }

    // 7. 매 초 화면 업데이트 (정밀 계산)
    setInterval(() => {
        const now = Date.now();
        localTimers.forEach((timer, i) => {
            if (timer && timer.isActive) {
                const diff = timer.targetTime - now;
                if (diff <= 0) {
                    document.getElementById(`display-${i}`).innerText = "00:00:00";
                    document.getElementById(`display-${i}`).style.color = "red";
                } else {
                    document.getElementById(`display-${i}`).innerText = formatTime(diff);
                    document.getElementById(`display-${i}`).style.color = "#222";
                }
            }
        });
    }, 100);

    function formatTime(ms) {
        const totalSec = Math.floor(ms / 1000);
        const h = Math.floor(totalSec / 3600);
        const m = Math.floor((totalSec % 3600) / 60);
        const s = totalSec % 60;
        return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    }
</script>
</body>
</html>
