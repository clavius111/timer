<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>런사 전용 3구 안전 타이머 (콤팩트 버전)</title>
    <style>
        body { background-color: #1a1a1a; color: white; text-align: center; font-family: 'Malgun Gothic', sans-serif; padding: 15px; }
        h1 { font-size: 24px; margin-bottom: 10px; }
        
        /* 컨테이너 크기 약 30% 축소 */
        .timer-container { 
            background: #252525; border-radius: 12px; padding: 15px; margin: 15px auto; 
            max-width: 350px; border: 1px solid #333; box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        
        /* 타이머 숫자 크기 축소 (60px -> 42px) */
        .timer-display { font-size: 42px; margin: 10px; color: #00ff00; font-weight: bold; font-family: monospace; }
        
        .input-group { margin-bottom: 10px; }
        
        /* 입력창 및 버튼 크기 축소 */
        input[type="number"] { padding: 8px; font-size: 14px; width: 80px; border-radius: 5px; border: none; }
        button { padding: 8px 14px; font-size: 14px; cursor: pointer; margin: 2px; border-radius: 5px; border: none; transition: 0.2s; font-weight: bold; }
        button:hover { opacity: 0.8; }
        
        .btn-set { background-color: #3498db; color: white; }
        .btn-start { background-color: #2ecc71; color: white; }
        .btn-stop { background-color: #e67e22; color: white; }
        .btn-reset { background-color: #e74c3c; color: white; }
        
        h2 { color: #f1c40f; font-size: 18px; margin: 0; padding-bottom: 4px; border-bottom: 2px solid #f1c40f; display: inline-block; }
        
        /* 메모장 크기 축소 */
        textarea {
            width: 90%;
            height: 45px;
            background-color: #333;
            color: white;
            border: 1px solid #555;
            border-radius: 6px;
            padding: 8px;
            margin-top: 10px;
            resize: vertical;
            font-size: 13px;
            font-family: inherit;
        }
        textarea:focus { outline: none; border-color: #f1c40f; }

        .save-msg { color: #666; font-size: 12px; margin-top: 25px; }
    </style>
</head>
<body>

    <h1>🚀 런사의 3구 독립 저장 타이머</h1>

    <div class="timer-container">
        <h2>타이머 1</h2>
        <div id="display1" class="timer-display">00:00:00</div>
        <div class="input-group">
            <input type="number" id="input1" placeholder="분 입력">
            <button class="btn-set" onclick="setTimer(1)">시간 설정</button>
        </div>
        <button class="btn-start" onclick="startTimer(1)">시작</button>
        <button class="btn-stop" onclick="stopTimer(1)">중지</button>
        <button class="btn-reset" onclick="resetTimer(1)">초기화</button>
        <textarea id="memo1" placeholder="타이머 1 메모 (자동 저장됩니다)" oninput="saveMemo(1)"></textarea>
    </div>

    <div class="timer-container">
        <h2>타이머 2</h2>
        <div id="display2" class="timer-display">00:00:00</div>
        <div class="input-group">
            <input type="number" id="input2" placeholder="분 입력">
            <button class="btn-set" onclick="setTimer(2)">시간 설정</button>
        </div>
        <button class="btn-start" onclick="startTimer(2)">시작</button>
        <button class="btn-stop" onclick="stopTimer(2)">중지</button>
        <button class="btn-reset" onclick="resetTimer(2)">초기화</button>
        <textarea id="memo2" placeholder="타이머 2 메모 (자동 저장됩니다)" oninput="saveMemo(2)"></textarea>
    </div>

    <div class="timer-container">
        <h2>타이머 3</h2>
        <div id="display3" class="timer-display">00:00:00</div>
        <div class="input-group">
            <input type="number" id="input3" placeholder="분 입력">
            <button class="btn-set" onclick="setTimer(3)">시간 설정</button>
        </div>
        <button class="btn-start" onclick="startTimer(3)">시작</button>
        <button class="btn-stop" onclick="stopTimer(3)">중지</button>
        <button class="btn-reset" onclick="resetTimer(3)">초기화</button>
        <textarea id="memo3" placeholder="타이머 3 메모 (자동 저장됩니다)" oninput="saveMemo(3)"></textarea>
    </div>

    <p class="save-msg">※ 타이머 시간과 메모는 컴퓨터 재부팅 후에도 자동으로 유지됩니다.</p>

    <script>
        let timers = {
            1: { timeLeft: 0, timerId: null },
            2: { timeLeft: 0, timerId: null },
            3: { timeLeft: 0, timerId: null }
        };

        window.onload = function() {
            for (let i = 1; i <= 3; i++) {
                const savedTime = localStorage.getItem('timerData' + i);
                if (savedTime) {
                    timers[i].timeLeft = parseInt(savedTime);
                    updateDisplay(i);
                }
                
                const savedMemo = localStorage.getItem('memoData' + i);
                if (savedMemo) {
                    document.getElementById('memo' + i).value = savedMemo;
                }
            }
        };

        function updateDisplay(idx) {
            const time = timers[idx].timeLeft;
            const hrs = Math.floor(time / 3600);
            const mins = Math.floor((time % 3600) / 60);
            const secs = time % 60;
            document.getElementById('display' + idx).innerText = 
                `${String(hrs).padStart(2, '0')}:${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
            
            localStorage.setItem('timerData' + idx, time);
        }

        function saveMemo(idx) {
            const memoText = document.getElementById('memo' + idx).value;
            localStorage.setItem('memoData' + idx, memoText);
        }

        function setTimer(idx) {
            const val = document.getElementById('input' + idx).value;
            if (val) {
                timers[idx].timeLeft = val * 60;
                updateDisplay(idx);
            }
        }

        function startTimer(idx) {
            if (timers[idx].timerId) return;
            timers[idx].timerId = setInterval(() => {
                if (timers[idx].timeLeft > 0) {
                    timers[idx].timeLeft--;
                    updateDisplay(idx);
                } else {
                    clearInterval(timers[idx].timerId);
                    timers[idx].timerId = null;
                    alert(idx + "번 타이머가 끝났습니다!");
                }
            }, 1000);
        }

        function stopTimer(idx) {
            clearInterval(timers[idx].timerId);
            timers[idx].timerId = null;
        }

        function resetTimer(idx) {
            if (confirm(idx + "번 타이머를 정말로 리셋하시겠습니까?\n(메모는 지워지지 않습니다.)")) {
                stopTimer(idx);
                timers[idx].timeLeft = 0;
                localStorage.removeItem('timerData' + idx);
                updateDisplay(idx);
            }
        }
    </script>
</body>
</html>
