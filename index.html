<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>런사 전용 3구 안전 타이머</title>
    <style>
        body { background-color: #1a1a1a; color: white; text-align: center; font-family: 'Malgun Gothic', sans-serif; padding: 20px; }
        .timer-container { 
            background: #252525; border-radius: 15px; padding: 20px; margin-bottom: 30px; 
            border: 1px solid #333; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .timer-display { font-size: 60px; margin: 20px; color: #00ff00; font-weight: bold; font-family: monospace; }
        .input-group { margin-bottom: 15px; }
        input { padding: 10px; font-size: 16px; width: 100px; border-radius: 5px; border: none; }
        button { padding: 10px 18px; font-size: 16px; cursor: pointer; margin: 3px; border-radius: 5px; border: none; transition: 0.2s; font-weight: bold; }
        button:hover { opacity: 0.8; }
        .btn-set { background-color: #3498db; color: white; }
        .btn-start { background-color: #2ecc71; color: white; }
        .btn-stop { background-color: #e67e22; color: white; }
        .btn-reset { background-color: #e74c3c; color: white; }
        h2 { color: #f1c40f; margin-bottom: 10px; border-bottom: 2px solid #f1c40f; display: inline-block; padding-bottom: 5px; }
        .save-msg { color: #666; font-size: 13px; margin-top: 40px; }
    </style>
</head>
<body>

    <h1>🚀 런사의 3구 독립 저장 타이머</h1>

    <div class="timer-container" id="container1">
        <h2>타이머 1</h2>
        <div id="display1" class="timer-display">00:00:00</div>
        <div class="input-group">
            <input type="number" id="input1" placeholder="분 입력">
            <button class="btn-set" onclick="setTimer(1)">시간 설정</button>
        </div>
        <button class="btn-start" onclick="startTimer(1)">시작</button>
        <button class="btn-stop" onclick="stopTimer(1)">중지</button>
        <button class="btn-reset" onclick="resetTimer(1)">초기화</button>
    </div>

    <div class="timer-container" id="container2">
        <h2>타이머 2</h2>
        <div id="display2" class="timer-display">00:00:00</div>

            <input type="number" id="input2" placeholder="분 입력">
            <button class="btn-set" onclick="setTimer(2)">시간 설정</button>
        </div>
        <button class="btn-start" onclick="startTimer(2)">시작</button>
        <button class="btn-stop" onclick="stopTimer(2)">중지</button>
        <button class="btn-reset" onclick="resetTimer(2)">초기화</button>
