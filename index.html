<!DOCTYPE html>
<html>
<head>
    <style>
        body { background: #1a1a1a; color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .timer-container { display: flex; gap: 15px; width: 100%; max-width: 1000px; justify-content: center; }
        .timer-card { background: #2d2d2d; border-radius: 10px; padding: 15px; width: 300px; border: 1px solid #444; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .title { font-size: 12px; color: #888; margin-bottom: 10px; font-weight: bold; letter-spacing: 1px; }
        
        /* 시간을 넉넉하게 넣을 수 있도록 입력창 가로 확대 */
        input { 
            background: #111; color: #00ff00; border: 1px solid #555; 
            font-size: 28px; width: 90%; text-align: center; 
            padding: 8px 0; border-radius: 5px; margin-bottom: 15px;
            font-family: 'Courier New', monospace;
        }

        /* 버튼 크기를 작고 깔끔하게 조절 */
        .btn-group { display: flex; gap: 5px; justify-content: center; }
        button { 
            padding: 6px 12px; border: none; border-radius: 4px; 
            cursor: pointer; font-weight: bold; font-size: 11px; 
            transition: 0.2s;
        }
        .start { background: #2e7d32; color: white; width: 60px; }
        .start:hover { background: #388e3c; }
        .reset { background: #c62828; color: white; width: 50px; }
        .reset:hover { background: #d32f2f; }
    </style>
</head>
<body>

    <h2 style="color: #555; margin-bottom: 30px;">BING MACRO CONTROL CENTER</h2>

    <div class="timer-container">
        <div class="timer-card">
            <div class="title">S21 MACRO</div>
            <input type="text" id="t1" value="00:15:00">
            <div class="btn-group">
                <button class="start" onclick="start(1)">START</button>
                <button class="reset" onclick="reset(1)">RESET</button>
            </div>
        </div>

        <div class="timer-card">
            <div class="title">PC BING</div>
            <input type="text" id="t2" value="00:25:00">
            <div class="btn-group">
                <button class="start" onclick="start(2)">START</button>
                <button class="reset" onclick="reset(2)">RESET</button>
            </div>
        </div>

        <div class="timer-card">
            <div class="title">CUSTOM</div>
            <input type="text" id="t3" value="24:00:00">
            <div class="btn-group">
                <button class="start" onclick="start(3)">START</button>
                <button class="reset" onclick="reset(3)">RESET</button>
            </div>
        </div>
    </div>

    <script>
        let intervals = {};
        function start(id) {
            if (intervals[id]) return;
            let el = document.getElementById('t' + id);
            let parts = el.value.split(':');
            let sec = (+parts[0]) * 3600 + (+parts[1]) * 60 + (+parts[2]);
            
            intervals[id] = setInterval(() => {
                if (sec <= 0) {
                    clearInterval(intervals[id]);
                    intervals[id] = null;
                    el.style.color = "#ff4444";
                    alert(id + "번 작업이 종료되었습니다!");
                    return;
                }
                sec--;
                let h = Math.floor(sec / 3600).toString().padStart(2, '0');
                let m = Math.floor((sec % 3600) / 60).toString().padStart(2, '0');
                let s = (sec % 60).toString().padStart(2, '0');
                el.value = h + ":" + m + ":" + s;
                el.style.color = "#00ff00";
            }, 1000);
        }
        function reset(id) {
            clearInterval(intervals[id]);
            intervals[id] = null;
            document.getElementById('t' + id).value = "00:00:00";
            document.getElementById('t' + id).style.color = "#00ff00";
        }
    </script>
</body>
</html>
